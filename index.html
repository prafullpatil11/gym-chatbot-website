<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO SECTION -->
    <section style="text-align:center; padding:50px;">
        <h1>💪 AI Gym Trainer</h1>
        <p>Your Personal Fitness Assistant</p>

        <button onclick="toggleChat()" style="padding:10px 20px; font-size:16px;">
            💬 Talk to Trainer
        </button>
    </section>

    <!-- FEATURES -->
    <section style="padding:40px;">
        <h2>Features</h2>
        <ul>
            <li>📏 Smart Data Input</li>
            <li>🧮 BMI Calculator</li>
            <li>🎯 Goal-Based Workout</li>
            <li>🏋️ Multiple Workout Plans</li>
        </ul>
    </section>

    <!-- CHATBOT (DIALOGFLOW) -->
    <div id="chatbot" style="
        display:none;
        position:fixed;
        bottom:20px;
        right:20px;
        z-index:999;
        box-shadow:0 0 15px rgba(0,0,0,0.3);
    ">
        <iframe 
            height="430" 
            width="350" 
            src="https://bot.dialogflow.com/49c0b8ba-612f-4f88-8f22-1c1b760135ce">
        </iframe>
    </div>

    <!-- SCRIPT -->
    <script>
        function toggleChat() {
            let chat = document.getElementById("chatbot");
            if (chat.style.display === "none") {
                chat.style.display = "block";
            } else {
                chat.style.display = "none";
            }
        }
    </script>

</body>
</html>
